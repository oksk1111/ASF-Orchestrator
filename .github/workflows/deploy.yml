name: Deploy to OCI

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            set -e
            cd /home/ubuntu/ASF-Orchestrator

            echo "=== git pull ==="
            git pull origin main

            echo "=== pip install ==="
            .venv/bin/pip install -r requirements.txt -q

            echo "=== DB schema update ==="
            .venv/bin/python -c "from app.cache import store; store.init_db(); print('DB ok')"

            echo "=== restart service ==="
            sudo systemctl restart asf-backend
            sleep 3
            sudo systemctl is-active asf-backend
            echo "Deploy complete"
