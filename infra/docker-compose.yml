services:
  backend:
    build:
      context: ../services/backend
      dockerfile: Dockerfile
    container_name: asf-backend
    ports:
      - "8000:8000"
    environment:
      APP_ENV: dev
      JWT_SECRET: asf-dev-secret-change-me
      RATE_LIMIT_PER_MINUTE: 120
      MAFRA_API_KEY: ${MAFRA_API_KEY:-sample}
      KAMIS_API_KEY: ${KAMIS_API_KEY}
      KAMIS_API_ID: ${KAMIS_API_ID:-5129}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      - postgres
      - redis
      - rabbitmq

  celery-worker:
    build:
      context: ../services/backend
      dockerfile: Dockerfile
    container_name: asf-celery-worker
    command: celery -A app.services.fresh_alert.celery_app worker --loglevel=info
    environment:
      APP_ENV: dev
      MAFRA_API_KEY: ${MAFRA_API_KEY:-sample}
      KAMIS_API_KEY: ${KAMIS_API_KEY}
      KAMIS_API_ID: ${KAMIS_API_ID:-5129}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      - redis
      - postgres

  celery-beat:
    build:
      context: ../services/backend
      dockerfile: Dockerfile
    container_name: asf-celery-beat
    command: celery -A app.services.fresh_alert.celery_app beat --loglevel=info
    environment:
      APP_ENV: dev
      MAFRA_API_KEY: ${MAFRA_API_KEY:-sample}
      KAMIS_API_KEY: ${KAMIS_API_KEY}
      KAMIS_API_ID: ${KAMIS_API_ID:-5129}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      - redis
      - celery-worker

  postgres:
    image: postgres:16
    container_name: asf-postgres
    environment:
      POSTGRES_DB: asf
      POSTGRES_USER: asf
      POSTGRES_PASSWORD: asf
    ports:
      - "5432:5432"
    volumes:
      - asf-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: asf-redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: asf-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  asf-postgres-data:
